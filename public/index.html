<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Authentication</title>
    </head>
    <body>
        <div class="sign">
            <form action="" method="">
                <input
                    type="text"
                    for="username"
                    id="username"
                    placeholder="Enter Username"
                />
                <input
                    type="text"
                    for="password"
                    id="password"
                    placeholder="Enter Password"
                />
            </form>
            <div class="sign-btns">
                <button class="signup" onclick="signUpUser()">Sign Up</button>
                <button class="signin" onclick="signInUser()">Sign In</button>
            </div>
        </div>

        <script src="index.js"></script>
    </body>
</html>
